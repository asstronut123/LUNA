name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Fix flat structure
        run: |
          mkdir -p app/src/main/java/com/mojcikel/app
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
          [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/ || true
          [ -f MainActivity.java ] && mv MainActivity.java app/src/main/java/com/mojcikel/app/ || true
          [ -f index.html ] && mv index.html app/src/main/assets/ || true
          for f in ic_launcher.png ic_launcher_round.png; do if [ -f "$f" ]; then for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do cp "$f" app/src/main/res/mipmap-$d/; done; rm "$f"; fi; done
          ls -R app
      - name: Build APK
        run: cd app && gradle assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: { name: MojCikel-APK, path: app/build/outputs/apk/debug/*.apk }
