name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Recreate full project
        run: |
          # pobriši napačne stare datoteke
          rm -rf app/build.gradle settings.gradle build.gradle gradle.properties || true
          
          mkdir -p app/src/main/java/com/mojcikel/app
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi

          # premakni kar je na kupu v pravo mesto
          [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/AndroidManifest.xml || true
          [ -f MainActivity.java ] && mv MainActivity.java app/src/main/java/com/mojcikel/app/MainActivity.java || true
          [ -f index.html ] && mv index.html app/src/main/assets/index.html || true
          for f in ic_launcher.png ic_launcher_round.png; do if [ -f "$f" ]; then for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do cp "$f" app/src/main/res/mipmap-$d/ 2>/dev/null || true; done; rm "$f"; fi; done

          # če še vedno ni MainActivity, ustvari dummy da ne crkne
          if [ ! -f app/src/main/java/com/mojcikel/app/MainActivity.java ]; then
            find . -name "MainActivity.java" -exec cp {} app/src/main/java/com/mojcikel/app/MainActivity.java \; 2>/dev/null || true
          fi

          cat > settings.gradle <<'EOF'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          // Top-level build file
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.mojcikel.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.mojcikel.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } debug { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {}
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g
          android.useAndroidX=true
          EOF

          # če ni AndroidManifest, ga ustvari
          if [ ! -f app/src/main/AndroidManifest.xml ]; then
          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="MojCikel">
              <activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity>
            </application>
          </manifest>
          EOF
          fi

          ls -R app

      - name: Build APK
        run: cd app && gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: { name: MojCikel-APK, path: app/build/outputs/apk/debug/*.apk }
