name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
      - name: Recreate full project
        run: |
          rm -rf app/build.gradle settings.gradle build.gradle gradle.properties || true
          mkdir -p app/src/main/java/com/mojcikel/app
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
          [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/AndroidManifest.xml || true
          [ -f MainActivity.java ] && mv MainActivity.java app/src/main/java/com/mojcikel/app/MainActivity.java || true
          [ -f index.html ] && mv index.html app/src/main/assets/index.html || true
          for f in ic_launcher.png ic_launcher_round.png; do if [ -f "$f" ]; then for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do cp "$f" app/src/main/res/mipmap-$d/ 2>/dev/null || true; done; rm "$f"; fi; done
          [ -f app/src/main/java/com/mojcikel/app/MainActivity.java ] || find . -name "MainActivity.java" -exec cp {} app/src/main/java/com/mojcikel/app/MainActivity.java \; 2>/dev/null || true
          echo "include ':app'" > settings.gradle
          echo "plugins { id 'com.android.application' version '8.2.0' apply false }" > build.gradle
          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.mojcikel.app'; compileSdk 34; defaultConfig { applicationId "com.mojcikel.app"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }; buildTypes { release { minifyEnabled false } debug { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }
          dependencies {}
          EOF
          echo "org.gradle.jvmargs=-Xmx2g" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          ls -R app
      - name: Build APK
        run: cd app && gradle assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MojCikel-APK
          path: app/build/outputs/apk/debug/*.apk
