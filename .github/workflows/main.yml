name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v3
        with: { cache-disabled: true }
      - name: Recreate full project
        run: |
          rm -rf app build.gradle settings.gradle gradle.properties
          mkdir -p app/src/main/java/com/mojcikel/app
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/mipmap-hdpi
          
          # index.html - če nimaš svojega, ustvari prazen da ne crkne
          if [ -f index.html ]; then mv index.html app/src/main/assets/; fi
          [ -f app/src/main/assets/index.html ] || echo "<html><body><h1>MojCikel dela!</h1></body></html>" > app/src/main/assets/index.html

          cat > settings.gradle <<'EOF'
          include ':app'
          EOF
          cat > build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF
          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.mojcikel.app'
              compileSdk 34
              defaultConfig { applicationId "com.mojcikel.app"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }
              buildTypes { release { minifyEnabled false } debug { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {}
          EOF
          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g
          android.useAndroidX=true
          EOF
          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" android:label="MojCikel" android:theme="@android:style/Theme.NoTitleBar">
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
              </activity>
            </application>
          </manifest>
          EOF
          cat > app/src/main/java/com/mojcikel/app/MainActivity.java <<'EOF'
          package com.mojcikel.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView wv = new WebView(this);
                  wv.getSettings().setJavaScriptEnabled(true);
                  wv.setWebViewClient(new WebViewClient());
                  wv.loadUrl("file:///android_asset/index.html");
                  setContentView(wv);
              }
          }
          EOF
      - name: Build APK
        run: cd app && gradle assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: { name: MojCikel-APK, path: app/build/outputs/apk/debug/*.apk }
